<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Diện Đặt Cược - PLAYER</title>
    <style>
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-user-select: none; -ms-user-select: none; user-select: none;
        }

        body {
            font-family: Arial, sans-serif; background-color: #111; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden; padding: 20px;
        }

        /* KHU VỰC CÁC Ô CỬA */
        .doors-container {
            display: flex; justify-content: space-around; width: 100%; gap: 20px; margin-top: 10px;
        }

        .door-wrapper {
            flex: 1; max-width: 280px; display: flex; flex-direction: column; align-items: center; transition: opacity 0.5s;
        }

        .answer-box {
            color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 10px;
            background: #27ae60; padding: 8px 16px; border-radius: 4px;
            border: 1px solid #2ecc71; min-height: 44px; display: flex;
            align-items: center; justify-content: center; width: 100%; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: background-color 0.3s;
        }

        .door-wrapper.failed .answer-box {
            background: #c0392b !important; border-color: #ff3333 !important;
        }

        .door {
            width: 100%; aspect-ratio: 16 / 9; background-color: #b71c1c;
            border: 3px solid #ffcc00; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 10px; display: grid; grid-template-columns: repeat(5, 1fr);
            grid-auto-rows: 25px; gap: 4px; overflow-y: auto; cursor: pointer;
            transition: all 0.3s ease;
        }

        .door.drag-over { background-color: #d32f2f; transform: scale(1.03); }
        .door.selected { border-color: #00e676; box-shadow: 0 0 15px #00e676; transform: scale(1.02); }
        
        .door.dropped {
            transform: rotateX(85deg); opacity: 0.1; background-color: #000;
            box-shadow: none; pointer-events: none;
        }

        .bet-amount {
            color: #ffcc00; font-size: 16px; font-weight: bold; margin-top: 10px;
            background: rgba(0, 0, 0, 0.85); padding: 6px 16px; border-radius: 4px;
            border: 1px solid #444; min-height: 34px; display: flex;
            align-items: center; justify-content: center; width: 100%; text-align: center;
        }

        /* KHU VỰC CÂU HỎI */
        .question-container {
            width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 10px 0;
        }

        .question-box {
            background: linear-gradient(135deg, #2c3e50, #34495e); border: 2px solid #7f8c8d;
            border-radius: 12px; padding: 25px 40px; color: #ffffff; font-size: 24px;
            font-weight: bold; text-align: center; max-width: 800px; width: 100%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6); letter-spacing: 0.5px;
        }

        /* KHU VỰC BÀN TIỀN DƯỚI */
        .table-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; }

        .timer-box {
            background: #222; color: #ff3d00; font-family: 'Courier New', Courier, monospace;
            font-size: 28px; font-weight: bold; padding: 6px 24px; border: 3px solid #34495e;
            border-bottom: none; border-radius: 10px 10px 0 0; box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            text-shadow: 0 0 10px rgba(255, 61, 0, 0.5); z-index: 2; transition: color 0.3s;
        }
        .timer-box.warning { color: #ffff00; text-shadow: 0 0 10px rgba(255, 255, 0, 0.5); }

        .table-container {
            width: 100%; background: #2c3e50; border-top: 6px solid #34495e;
            padding: 15px 20px; border-radius: 12px 12px 0 0; cursor: pointer; position: relative; z-index: 1;
        }

        .table-title { color: #fff; text-align: center; margin-bottom: 15px; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        
        .money-grid { 
            display: grid; 
            grid-template-columns: repeat(20, 1fr); 
            gap: 10px; 
            justify-items: center; 
            min-height: 74px;
        }

        .money-stack { width: 60px; height: 32px; cursor: grab; transition: transform 0.1s; }
        .money-stack img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: block; pointer-events: none; }
        
        .door .money-stack { width: 100%; height: 100%; cursor: pointer; pointer-events: none; }
    </style>
</head>
<body>

    <div class="doors-container">
        <div class="door-wrapper" id="wrap-1">
            <div class="answer-box" id="ans-txt-1">---</div>
            <div class="door" id="door-1" data-bet="0"></div>
            <div class="bet-amount" id="bet-1">0 $A</div>
        </div>
        <div class="door-wrapper" id="wrap-2">
            <div class="answer-box" id="ans-txt-2">---</div>
            <div class="door" id="door-2" data-bet="0"></div>
            <div class="bet-amount" id="bet-2">0 $A</div>
        </div>
        <div class="door-wrapper" id="wrap-3">
            <div class="answer-box" id="ans-txt-3">---</div>
            <div class="door" id="door-3" data-bet="0"></div>
            <div class="bet-amount" id="bet-3">0 $A</div>
        </div>
        <div class="door-wrapper" id="wrap-4">
            <div class="answer-box" id="ans-txt-4">---</div>
            <div class="door" id="door-4" data-bet="0"></div>
            <div class="bet-amount" id="bet-4">0 $A</div>
        </div>
    </div>

    <div class="question-container">
        <div class="question-box" id="question-text">CHỜ MC NẠP CHỦ ĐỀ...</div>
    </div>

    <div class="table-wrapper">
        <div class="timer-box" id="game-timer">01:00</div>
        <div class="table-container" id="table-desk">
            <div class="table-title" id="table-guide">Bàn Tiền (Vui lòng đợi lệnh của MC)</div>
            <div class="money-grid" id="money-board"></div>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
