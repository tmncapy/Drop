<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÀN HÌNH ĐÁP ÁN - ANSWER SCREEN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: Arial, sans-serif; background-color: #000; color: #fff;
            height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; padding: 10px;
        }

        /* KHU VỰC CHỨA CÁC Ô CỬA LỚN */
        .doors-container {
            display: flex; justify-content: center; align-items: center; width: 100%; max-width: 1920px; gap: 30px;
        }

        /* KHUNG CHỨA CỬA LỚN (MAX-WIDTH 480PX) */
        .door-wrapper {
            flex: 1; max-width: 480px; display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* TỶ LỆ CỦA Ô CỬA (4:2.6) */
        .door-frame {
            width: 100%; aspect-ratio: 4 / 2.6; position: relative; border: 4px solid #ffcc00;
            border-radius: 6px; overflow: hidden; background: #000; box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        /* LỚP PHỦ CHO Ô CỬA KHÔNG SỬ DỤNG (ĐÈ UNUSEDOOR.PNG) */
        .unused-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('unusedoor.png');
            background-size: 100% 100%; background-repeat: no-repeat;
            z-index: 10; /* Đè lên trên cùng */
            display: none;
            pointer-events: auto; /* Chặn click */
        }
        .unused-overlay.active {
            display: block;
        }

        /* LỚP NỀN ĐÁY (MẶC ĐỊNH LÀ INDOOR.PNG) */
        .bottom-bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('indoor.png');
            background-size: 100% 100%; background-repeat: no-repeat; z-index: 1;
            transition: background-image 0.2s ease;
        }

        /* ĐỔI SANG DROPDOOR.PNG KHI SẬP */
        .bottom-bg-layer.collapsed-bg {
            background-image: url('dropdoor.png') !important;
        }

        /* TEXT ĐÁP ÁN TRÊN NỀN INDOOR.PNG */
        .answer-text-inside {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            font-size: 32px; font-weight: bold; text-align: center; color: #ffffff;
            text-shadow: 0 3px 6px rgba(0,0,0,1), 0 0 15px rgba(0,0,0,0.8); z-index: 2;
            opacity: 0; transform: scale(0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
            word-break: break-word;
            line-height: 1.3;
        }
        .answer-text-inside.show { opacity: 1; transform: scale(1); }
        .answer-text-inside.hide-on-drop { opacity: 0 !important; transform: scale(0.3) !important; transition: all 0.2s ease !important; }

        /* CHỮ BÁO TIỀN RƠI CĂN GIỮA ĐỒNG ĐỀU */
        .fall-status-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #ff3333; font-size: 26px; font-weight: 900; text-align: center;
            text-transform: uppercase; line-height: 1.3; z-index: 2;
            text-shadow: 0 2px 4px #000, 0 0 10px #000, 0 0 20px #000;
            opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
        }
        .fall-status-text.active { opacity: 1; }

        /* LỚP BỀ MẶT CỬA DOOR.PNG */
        .door-surface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3;
            display: flex; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .door-wing {
            width: 50%; height: 100%; background-size: 200% 100%; background-position: left center;
            background-image: url('door.png'); transition: background-image 0.2s ease; background-repeat: no-repeat;
        }
        .door-wing.right { background-position: right center; }

        /* Wipe mở cánh cửa */
        .door-surface.wiped .door-wing.left { transform: translateX(-100%); }
        .door-surface.wiped .door-wing.right { transform: translateX(100%); }

        /* Khép cửa sập 1s */
        .door-surface.closing { transition: transform 1s ease-in-out !important; }
        .door-surface.closing .door-wing { transform: translateX(0) !important; }

        /* Ẩn bề mặt khi sập hố */
        .door-surface.dropped { display: none; }

        /* Đổi ảnh moneydoor.png */
        .bg-moneydoor { background-image: url('moneydoor.png') !important; }
    </style>
</head>
<body>

    <div class="doors-container">
        <div class="door-wrapper" id="ans-wrap-1">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-1"></div>
                <div class="bottom-bg-layer" id="bg-layer-1"></div>
                <div class="answer-text-inside" id="inside-txt-1"></div>
                <div class="fall-status-text" id="fall-txt-1">0 $A <br> ĐÃ RƠI</div>
                <div class="door-surface" id="surface-1">
                    <div class="door-wing left" id="wing-l-1"></div>
                    <div class="door-wing right" id="wing-r-1"></div>
                </div>
            </div>
        </div>

        <div class="door-wrapper" id="ans-wrap-2">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-2"></div>
                <div class="bottom-bg-layer" id="bg-layer-2"></div>
                <div class="answer-text-inside" id="inside-txt-2"></div>
                <div class="fall-status-text" id="fall-txt-2">0 $A <br> ĐÃ RƠI</div>
                <div class="door-surface" id="surface-2">
                    <div class="door-wing left" id="wing-l-2"></div>
                    <div class="door-wing right" id="wing-r-2"></div>
                </div>
            </div>
        </div>

        <div class="door-wrapper" id="ans-wrap-3">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-3"></div>
                <div class="bottom-bg-layer" id="bg-layer-3"></div>
                <div class="answer-text-inside" id="inside-txt-3"></div>
                <div class="fall-status-text" id="fall-txt-3">0 $A <br> ĐÃ RƠI</div>
                <div class="door-surface" id="surface-3">
                    <div class="door-wing left" id="wing-l-3"></div>
                    <div class="door-wing right" id="wing-r-3"></div>
                </div>
            </div>
        </div>

        <div class="door-wrapper" id="ans-wrap-4">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-4"></div>
                <div class="bottom-bg-layer" id="bg-layer-4"></div>
                <div class="answer-text-inside" id="inside-txt-4"></div>
                <div class="fall-status-text" id="fall-txt-4">0 $A <br> ĐÃ RƠI</div>
                <div class="door-surface" id="surface-4">
                    <div class="door-wing left" id="wing-l-4"></div>
                    <div class="door-wing right" id="wing-r-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('gameshow_money_drop');
        let currentBets = { b1: 0, b2: 0, b3: 0, b4: 0 };
        let activeRound = 1;

        function setUnusedStatus(doorId, isUnused) {
            const overlay = document.getElementById(`unused-${doorId}`);
            if (overlay) {
                if (isUnused) overlay.classList.add('active');
                else overlay.classList.remove('active');
            }
        }

        channel.onmessage = function(event) {
            const { action, data } = event.data;

            switch(action) {
                case 'sync_bets_to_mc':
                    currentBets.b1 = data.b1 || 0;
                    currentBets.b2 = data.b2 || 0;
                    currentBets.b3 = data.b3 || 0;
                    currentBets.b4 = data.b4 || 0;
                    
                    for(let i = 1; i <= 4; i++) {
                        document.getElementById(`fall-txt-${i}`).innerHTML = `${currentBets[`b${i}`].toLocaleString('vi-VN')} $A <br> ĐÃ RƠI`;
                    }
                    break;

                case 'update_single_answer':
                    // Đồng bộ chuẩn ID cửa hiển thị đáp án dựa vào câu hiện tại
                    let targetDoorId = data.id; 

                    if (activeRound === 8) {
                        if (data.id === 1) targetDoorId = 2;
                        else if (data.id === 2) targetDoorId = 3;
                    }

                    // Hiển thị chữ đáp án lên ô cửa tương ứng
                    const insideTxt = document.getElementById(`inside-txt-${targetDoorId}`);
                    if (insideTxt) {
                        insideTxt.innerText = data.text;
                        insideTxt.classList.remove('hide-on-drop'); 
                        insideTxt.classList.add('show');
                    }

                    // Kích hoạt hiệu ứng mở (wipe) cánh cửa gỗ ra để lộ đáp án
                    const surfaceEl = document.getElementById(`surface-${targetDoorId}`);
                    if (surfaceEl) {
                        surfaceEl.classList.add('wiped');
                    }
                    break;

                case 'timer_control':
                    if (data.status === 'start' || data.status === 'add30') {
                        for (let i = 1; i <= 4; i++) {
                            document.getElementById(`wing-l-${i}`).classList.add('bg-moneydoor');
                            document.getElementById(`wing-r-${i}`).classList.add('bg-moneydoor');
                        }
                    }
                    break;

                case 'change_round':
                    activeRound = parseInt(data.round);
                    
                    // Khôi phục trạng thái ban đầu của cả 4 cửa
                    for (let i = 1; i <= 4; i++) {
                        setUnusedStatus(i, false);
                    }

                    // Tự động phủ màn xám (unusedoor.png) theo quy tắc câu hỏi
                    if (activeRound >= 5 && activeRound <= 7) {
                        setUnusedStatus(4, true); // Ẩn cửa 4
                    } else if (activeRound === 8) {
                        setUnusedStatus(1, true); // Ẩn cửa 1
                        setUnusedStatus(4, true); // Ẩn cửa 4
                    }
                    break;

                case 'open_door':
                    const doorId = data.doorId;
                    const surface = document.getElementById(`surface-${doorId}`);
                    const fallTxt = document.getElementById(`fall-txt-${doorId}`);
                    const bgLayer = document.getElementById(`bg-layer-${doorId}`);
                    const insideText = document.getElementById(`inside-txt-${doorId}`);

                    if (insideText) {
                        insideText.classList.remove('show');
                        insideText.classList.add('hide-on-drop');
                    }

                    if (surface) {
                        // 1. Khép cửa sập tạm thời trong 1 giây
                        surface.classList.add('closing');
                        surface.classList.remove('wiped');

                        // 2. Kích hoạt hiệu ứng sập hẳn hố sau khi khép xong
                        setTimeout(() => {
                            surface.classList.remove('closing');
                            surface.classList.add('dropped'); 
                            if (bgLayer) bgLayer.classList.add('collapsed-bg'); 
                            if (fallTxt) fallTxt.classList.add('active');   
                        }, 1000);
                    }
                    break;

                case 'reset_round':
                    for (let i = 1; i <= 4; i++) {
                        document.getElementById(`wing-l-${i}`).classList.remove('bg-moneydoor');
                        document.getElementById(`wing-r-${i}`).classList.remove('bg-moneydoor');
                        
                        const surfaceReset = document.getElementById(`surface-${i}`);
                        if (surfaceReset) surfaceReset.className = "door-surface"; 
                        
                        const bgLyr = document.getElementById(`bg-layer-${i}`);
                        if (bgLyr) bgLyr.classList.remove('collapsed-bg');
                        
                        const insideReset = document.getElementById(`inside-txt-${i}`);
                        if (insideReset) {
                            insideReset.className = "answer-text-inside"; 
                            insideReset.innerText = "";
                        }

                        const fallT = document.getElementById(`fall-txt-${i}`);
                        if (fallT) fallT.classList.remove('active');

                        setUnusedStatus(i, false);
                    }
                    break;
            }
        };
    </script>
</body>
</html>
