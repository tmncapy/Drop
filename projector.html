<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Projector Interface - Full Flow with Clock</title>
    <style>
        @font-face {
            font-family: 'LHF_Mono';
            src: url('LHF_Mono.otf') format('opentype'), url('LHF Mono.otf') format('opentype');
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Myriad Pro', Arial, sans-serif; }
        .projector-container { 
            width: 1920px; height: 1080px; position: relative; margin: auto;
            background-color: #000; overflow: hidden;
        }
        .bg-main { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-outline { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 90; pointer-events: none; }

        :root {
            --q-center-top: 500px;
            --q-moved-top: 367px; /* Câu hỏi dịch lên cao khi có đáp án */
            --ans-container-top: 480px;
            --clock-top: 610px;   /* THÔNG SỐ VỊ TRÍ CLOCK */
        }

        .strap-wrapper { position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; width: 1000px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .category-strap { width: 100%; height: auto; }
        .strap-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 32px; font-weight: bold; pointer-events: none; font-family: 'Myriad Pro', sans-serif; }
        .is-active { top: 50% !important; z-index: 20; transform: translate(-50%, -50%) scale(1.1); }
        .zoom-out { transform: translate(-50%, -50%) scale(0) !important; opacity: 0; }

        #central-box { position: absolute; top: var(--q-center-top); left: 50%; transform: translateX(-50%) scale(0); width: 950px; z-index: 5; color: white; font-size: 38px; text-align: center; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; cursor: pointer; font-family: 'Myriad Pro', sans-serif; }
        #central-box.show { transform: translateX(-50%) scale(1); opacity: 1; }
        #central-box.move-up { top: var(--q-moved-top); font-size: 26px; line-height: 1.35; font-weight: bold; }

        #answers-container { position: absolute; top: var(--ans-container-top); left: 50%; transform: translateX(-50%) scale(0); width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 5; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        #answers-container.show { transform: translateX(-50%) scale(1); opacity: 1; }
        
        .ans-frame { width: 280px; height: 150px; position: relative; transition: all 0.5s ease; }
        .ans-frame.dropped {
            filter: brightness(0.2) grayscale(0.8);
            opacity: 0.25;
        }
        .ans-img { width: 100%; height: 100%; }
        .ans-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; font-size: 19px; font-weight: bold; width: 100%; text-align: center; 
            display: flex; justify-content: center; align-items: center; padding: 0 10px; 
            box-sizing: border-box; pointer-events: none; font-family: 'Myriad Pro', sans-serif;
        }

        /* --- CLOCK STYLES --- */
        #clock-container {
            position: absolute; top: var(--clock-top); left: 50%; transform: translateX(-50%) scale(0.75);
            width: 300px; height: 100px; z-index: 5; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0;
        }
        #clock-container.show { transform: translateX(-50%) scale(0.75); opacity: 1; }
        #clock-bg { width: 100%; height: 100%; }
        #clock-time { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 40px; font-weight: bold; font-family: 'LHF_Mono', 'LHF Mono', monospace; }

        /* --- PROGRESS HUD OVERLAY --- */
        #progress-hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 70;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 0;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #progress-hud-overlay.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .progress-capsule {
            position: relative;
            width: 1650px;
            height: 430px;
            background: radial-gradient(ellipse at center, #5c0f0f 0%, #300505 60%, #150202 100%);
            border-radius: 215px;
            border: 12px solid #d0d0d0;
            box-shadow: 0 0 0 6px #4a4a4a, inset 0 0 55px rgba(0,0,0,0.85), 0 30px 70px rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 60px;
            box-sizing: border-box;
        }

        .progress-money-text {
            color: #ffffff;
            font-size: 104px;
            font-weight: 800;
            letter-spacing: 4px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.9), 0 0 30px rgba(255,255,255,0.25);
            margin-bottom: 24px;
            font-family: 'Myriad Pro', Arial, sans-serif;
            line-height: 1;
        }

        .progress-slots-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .progress-slot {
            width: 118px;
            height: 118px;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 22px rgba(0,0,0,0.7);
            overflow: hidden;
            font-family: 'Myriad Pro', Arial, sans-serif;
            font-size: 68px;
            font-weight: bold;
            color: #ffffff;
        }

        .progress-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .progress-slot .slot-number {
            position: relative;
            z-index: 2;
            text-shadow: 0 4px 10px rgba(0,0,0,0.85);
        }

        .progress-slot.played-slot {
            background: #ffffff;
            border: 4px solid #ffffff;
        }

        .progress-slot.unplay-slot {
            background: linear-gradient(180deg, #c0292b 0%, #7a0909 100%);
            border: 4px solid #e74c3c;
            box-shadow: inset 0 4px 8px rgba(255,255,255,0.4), 0 10px 22px rgba(0,0,0,0.7);
        }

        .progress-gauge-icon {
            width: 118px;
            height: 118px;
            border-radius: 50%;
            background: radial-gradient(circle, #2a2a2a 0%, #111111 80%);
            border: 6px solid #d0d0d0;
            box-shadow: inset 0 0 14px #000, 0 8px 18px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="projector-container" onclick="unlockAudio()">
        <img src="mainscreen.png" class="bg-main">
        <img src="outlinescreen.png" class="bg-outline">

        <!-- Progress HUD Overlay -->
        <div id="progress-hud-overlay">
            <div class="progress-capsule">
                <div class="progress-money-text" id="prog-money-val">1.000.000 $A</div>
                <div class="progress-slots-row" id="prog-slots-container">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </div>

        <div id="audio-unlock-banner" style="position: absolute; top: 10px; right: 10px; z-index: 100; background: rgba(230, 126, 34, 0.9); color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; display: none;">
            🔊 Nhấp vào đây để BẬT ÂM THANH
        </div>

        <div id="central-box" onclick="showAnswers()">CHỜ MC CHỌN CHỦ ĐỀ...</div>

        <div id="answers-container">
            <div class="ans-frame" id="proj-frame-1"><img src="indoor.png" class="ans-img"><div class="ans-text" id="proj-ans-1">---</div></div>
            <div class="ans-frame" id="proj-frame-2"><img src="indoor.png" class="ans-img"><div class="ans-text" id="proj-ans-2">---</div></div>
            <div class="ans-frame" id="proj-frame-3"><img src="indoor.png" class="ans-img"><div class="ans-text" id="proj-ans-3">---</div></div>
            <div class="ans-frame" id="proj-frame-4"><img src="indoor.png" class="ans-img"><div class="ans-text" id="proj-ans-4">---</div></div>
        </div>

        <div id="clock-container">
            <img src="clock1.png" id="clock-bg">
            <div id="clock-time">1:00</div>
        </div>

        <div class="strap-wrapper" style="top: 400px; display: none;" id="item-a" data-state="0" onclick="processClick(this)">
            <img src="categorystrap.png" class="category-strap"><div class="strap-text">CHỦ ĐỀ A</div>
        </div>
        <div class="strap-wrapper" style="top: 550px; display: none;" id="item-b" data-state="0" onclick="processClick(this)">
            <img src="categorystrap.png" class="category-strap"><div class="strap-text">CHỦ ĐỀ B</div>
        </div>
    </div>

    <script src="network_sync.js"></script>
    <script>
        const channel = (typeof GameSyncChannel !== 'undefined') ? new GameSyncChannel('gameshow_money_drop') : new BroadcastChannel('gameshow_money_drop');
        const timerAudio = new Audio("SFX/drop_timer.mp3");
        timerAudio.loop = false;

        let activeSfxAudio = null;
        let clickCount = 0; 
        let isAudioUnlocked = false;

        function unlockAudio() {
            if (!isAudioUnlocked) {
                isAudioUnlocked = true;
                const banner = document.getElementById('audio-unlock-banner');
                if (banner) banner.style.display = 'none';
            }
        }

        let lastSfxPlay = { file: '', time: 0 };

        function playSfxOnProjector(filePath, loop = false, stopPrevious = true) {
            const now = Date.now();
            if (lastSfxPlay.file === filePath && (now - lastSfxPlay.time < 200)) {
                return; // Ignore duplicate playback call within 200ms
            }
            lastSfxPlay = { file: filePath, time: now };

            if (stopPrevious && activeSfxAudio) {
                activeSfxAudio.pause();
                activeSfxAudio.currentTime = 0;
            }
            const audio = new Audio(filePath);
            audio.loop = loop;
            if (stopPrevious) {
                activeSfxAudio = audio;
            }
            audio.play().then(() => {
                unlockAudio();
            }).catch(e => {
                console.warn("SFX Play error/blocked on Projector:", e);
                const banner = document.getElementById('audio-unlock-banner');
                if (banner) banner.style.display = 'block';
            });
        }

        let currentRound = 1;

        function applyAnswerVisibility() {
            for (let i = 1; i <= 4; i++) {
                const frame = document.getElementById(`proj-frame-${i}`);
                const textEl = document.getElementById(`proj-ans-${i}`);
                if (!frame) continue;

                let shouldShow = true;

                // Round rules:
                // Round 5,6,7 -> 3 options (hide door 4)
                // Round 8 -> 2 options (hide door 1 and 4)
                if (currentRound >= 5 && currentRound <= 7) {
                    if (i === 4) shouldShow = false;
                } else if (currentRound === 8) {
                    if (i === 1 || i === 4) shouldShow = false;
                }

                if (textEl && textEl.dataset.hiddenByContent === "true") {
                    shouldShow = false;
                }

                frame.style.display = shouldShow ? "block" : "none";
            }
        }

        function stopAllSfxOnProjector() {
            if (activeSfxAudio) {
                activeSfxAudio.pause();
                activeSfxAudio.currentTime = 0;
                activeSfxAudio = null;
            }
            timerAudio.pause();
            timerAudio.currentTime = 0;
        }

        function resetBigscreen() {
            // Stop all sounds so that no music plays during reset
            stopAllSfxOnProjector();

            const bgMain = document.querySelector('.bg-main');
            if (bgMain) {
                bgMain.src = "mainscreen.png";
            }

            document.getElementById("item-a").style.display = "none";
            document.getElementById("item-b").style.display = "none";

            document.getElementById("item-a").classList.remove("is-active", "zoom-out");
            document.getElementById("item-b").classList.remove("is-active", "zoom-out");

            document.getElementById("item-a").setAttribute("data-state", "0");
            document.getElementById("item-b").setAttribute("data-state", "0");

            document.getElementById("central-box").classList.remove("show", "move-up");
            document.getElementById("answers-container").classList.remove("show");
            document.getElementById("clock-container").classList.remove("show");
            const hudElReset = document.getElementById("progress-hud-overlay");
            if (hudElReset) hudElReset.classList.remove("show");

            // Reset text and drop states
            currentRound = 1;
            document.getElementById("central-box").innerText = "CHỜ MC CHỌN CHỦ ĐỀ...";
            for (let i = 1; i <= 4; i++) {
                const ansEl = document.getElementById(`proj-ans-${i}`);
                if (ansEl) {
                    ansEl.innerText = "---";
                    delete ansEl.dataset.hiddenByContent;
                }
                const frameEl = document.getElementById(`proj-frame-${i}`);
                if (frameEl) {
                    frameEl.classList.remove("dropped");
                }
            }
            applyAnswerVisibility();

            clickCount = 0;
        }

        channel.onmessage = function(event) {
            const { action, data } = event.data;

            switch(action) {
                case "play_sfx":
                    if (data && data.file) {
                        playSfxOnProjector(data.file, !!data.loop, data.stopPrevious !== false);
                    }
                    break;

                case "stop_sfx":
                    stopAllSfxOnProjector();
                    break;

                case "reset_round":
                    resetBigscreen();
                    break;

                case "show_progress":
                    const moneyValEl = document.getElementById('prog-money-val');
                    if (moneyValEl && data && data.totalMoneyText) {
                        moneyValEl.innerText = data.totalMoneyText;
                    }

                    const slotsContainer = document.getElementById('prog-slots-container');
                    if (slotsContainer && data && Array.isArray(data.questionStates)) {
                        slotsContainer.innerHTML = '';
                        const qStates = data.questionStates;
                        
                        for (let i = 0; i < qStates.length; i++) {
                            const isPlayed = qStates[i];
                            const slotDiv = document.createElement('div');
                            
                            if (isPlayed) {
                                slotDiv.className = 'progress-slot played-slot';
                                slotDiv.innerHTML = `
                                    <img src="played.png" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';" alt="Played">
                                    <div class="fallback-bundle" style="display:none;width:100%;height:100%;align-items:center;justify-content:center;background:#fff;">
                                        <svg width="48" height="38" viewBox="0 0 50 40">
                                            <rect x="5" y="10" width="40" height="24" rx="3" fill="#27ae60" stroke="#1e824c" stroke-width="2"/>
                                            <rect x="20" y="10" width="10" height="24" fill="#e74c3c"/>
                                            <circle cx="25" cy="22" r="5" fill="#f1c40f"/>
                                        </svg>
                                    </div>
                                `;
                            } else {
                                slotDiv.className = 'progress-slot unplay-slot';
                                slotDiv.innerHTML = `
                                    <img src="unplay.png" onerror="this.onerror=null;this.style.display='none';" alt="Unplay">
                                    <span class="slot-number">${i + 1}</span>
                                `;
                            }
                            slotsContainer.appendChild(slotDiv);
                        }

                        // Add Gauge Icon at the end of the row
                        const gaugeDiv = document.createElement('div');
                        gaugeDiv.className = 'progress-gauge-icon';
                        gaugeDiv.innerHTML = `
                            <svg width="94" height="94" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="46" fill="none" stroke="#d0d0d0" stroke-width="4"/>
                                <circle cx="50" cy="50" r="42" fill="#181818" stroke="#333" stroke-width="2"/>
                                <path d="M 20 70 A 38 38 0 1 1 80 70" fill="none" stroke="#444" stroke-dasharray="3,3" stroke-width="5"/>
                                <path d="M 50 12 A 38 38 0 0 1 80 70" fill="none" stroke="#e74c3c" stroke-dasharray="4,2" stroke-width="5"/>
                                <circle cx="50" cy="50" r="6" fill="#e74c3c"/>
                                <line x1="50" y1="50" x2="72" y2="30" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
                                <circle cx="50" cy="50" r="3" fill="#ffffff"/>
                            </svg>
                        `;
                        slotsContainer.appendChild(gaugeDiv);
                    }

                    const hudEl = document.getElementById('progress-hud-overlay');
                    if (hudEl) hudEl.classList.add('show');
                    break;

                case "hide_progress":
                    const hudElHide = document.getElementById('progress-hud-overlay');
                    if (hudElHide) hudElHide.classList.remove('show');
                    break;

                case "open_door":
                    if (data && data.doorId) {
                        let frameId = data.doorId;
                        if (currentRound >= 5 && currentRound <= 7) {
                            if (data.doorId === 1) frameId = 2;
                            else if (data.doorId === 2) frameId = 3;
                            else if (data.doorId === 3) frameId = 4;
                            else frameId = null;
                        } else if (currentRound === 8) {
                            if (data.doorId === 1) frameId = 2;
                            else if (data.doorId === 2) frameId = 3;
                            else frameId = null;
                        }
                        if (frameId) {
                            const frameEl = document.getElementById(`proj-frame-${frameId}`);
                            if (frameEl) {
                                frameEl.classList.add("dropped");
                            }
                        }
                    }
                    break;

                case "change_round":
                    if (data && data.round) {
                        currentRound = parseInt(data.round) || 1;
                        if (currentRound === 8) {
                            // Auto shift answers if they were previously placed in proj-ans-1/2
                            const a1 = document.getElementById("proj-ans-1");
                            const a2 = document.getElementById("proj-ans-2");
                            const a3 = document.getElementById("proj-ans-3");
                            if (a1 && a1.innerText && a1.innerText !== "---" && (!a3 || !a3.innerText || a3.innerText === "---")) {
                                if (a3) a3.innerText = a2.innerText;
                                if (a2) a2.innerText = a1.innerText;
                                if (a1) a1.innerText = "---";
                                if (a1) delete a1.dataset.hiddenByContent;
                                if (a2) delete a2.dataset.hiddenByContent;
                                if (a3) delete a3.dataset.hiddenByContent;
                            }
                        }
                        applyAnswerVisibility();
                    }
                    break;

                case "show_topics":
                    const bgMain = document.querySelector('.bg-main');
                    if (bgMain) {
                        bgMain.src = "main1.png";
                    }

                    document.querySelector("#item-a .strap-text").innerText = data.topicA || "CHỦ ĐỀ A";
                    document.querySelector("#item-b .strap-text").innerText = data.topicB || "CHỦ ĐỀ B";
                    
                    document.getElementById("item-a").style.display = "block";
                    document.getElementById("item-b").style.display = "block";
                    document.getElementById("item-a").classList.remove("is-active", "zoom-out");
                    document.getElementById("item-b").classList.remove("is-active", "zoom-out");
                    document.getElementById("item-a").setAttribute("data-state", "0");
                    document.getElementById("item-b").setAttribute("data-state", "0");
                    break;

                case "lock_topic":
                    const elA = document.getElementById("item-a");
                    const elB = document.getElementById("item-b");
                    if (data.type === "A") {
                        elB.classList.add("zoom-out");
                        elA.classList.add("is-active");
                        elA.setAttribute("data-state", "1");
                    } else {
                        elA.classList.add("zoom-out");
                        elB.classList.add("is-active");
                        elB.setAttribute("data-state", "1");
                    }
                    break;

                case "update_content":
                    if (data.type === 'question') {
                        document.getElementById("item-a").classList.add("zoom-out");
                        document.getElementById("item-b").classList.add("zoom-out");
                        
                        document.getElementById("central-box").innerText = data.data.question;
                        setTimeout(() => {
                            document.getElementById("central-box").classList.add("show");
                        }, 600);
                    }
                    break;

                case "update_single_answer":
                    let targetId = data.id;
                    if (currentRound === 8) {
                        if (data.id === 1) targetId = 2;
                        else if (data.id === 2) targetId = 3;
                        else targetId = null;
                    }
                    if (targetId) {
                        const ansEl = document.getElementById(`proj-ans-${targetId}`);
                        if (ansEl) {
                            ansEl.innerText = data.text;
                            if (!data.text || data.text.trim() === "") {
                                ansEl.dataset.hiddenByContent = "true";
                            } else {
                                delete ansEl.dataset.hiddenByContent;
                            }
                        }
                    }
                    applyAnswerVisibility();
                    break;

                case "show_all_q_and_a":
                    // Hide topics
                    document.getElementById("item-a").classList.add("zoom-out");
                    document.getElementById("item-b").classList.add("zoom-out");
                    
                    const box = document.getElementById('central-box');
                    const ans = document.getElementById('answers-container');
                    
                    box.classList.add('move-up');
                    box.classList.add('show');
                    ans.classList.add('show');
                    break;

                case "timer_tick":
                    let m = Math.floor(data.time / 60);
                    let s = data.time % 60;
                    document.getElementById("clock-time").innerText = m + ":" + s.toString().padStart(2, "0");
                    break;

                case "timer_control":
                    if (data.status === "start") {
                        stopAllSfxOnProjector();
                        const sfxFile = (currentRound === 8 || data.round === 8) ? "SFX/drop_timer_q8.mp3" : "SFX/drop_timer.mp3";
                        timerAudio.src = sfxFile;
                        timerAudio.currentTime = 0;
                        timerAudio.play().catch(e => console.log("Audio play blocked/failed:", e));
                        document.getElementById("clock-container").classList.add("show");
                    }
                    if (data.status === "stop") {
                        timerAudio.pause();
                        timerAudio.currentTime = 0;
                    }
                    break;
            }
        };

        function processClick(el) {
            let state = parseInt(el.getAttribute('data-state'));
            if (state === 0) {
                document.querySelectorAll('.strap-wrapper').forEach(item => { if (item !== el) item.classList.add('zoom-out'); });
                el.classList.add('is-active');
                el.setAttribute('data-state', '1');
            } else if (state === 1) {
                el.classList.add('zoom-out');
                setTimeout(() => { document.getElementById('central-box').classList.add('show'); }, 600);
                el.setAttribute('data-state', '2');
            }
        }

        function showAnswers() {
            const box = document.getElementById('central-box');
            const ans = document.getElementById('answers-container');
            const clock = document.getElementById('clock-container');

            if (clickCount === 0) {
                box.classList.remove('show');
                setTimeout(() => {
                    box.classList.add('move-up');
                    box.classList.add('show');
                    ans.classList.add('show');
                    clickCount++;
                }, 600);
            } else {
                clock.classList.add('show');
            }
        }

        // Initialize reset on page load
        resetBigscreen();
    </script>
</body>
</html>
