<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀN ĐIỀU KHIỂN - MC CONTROLLER</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; padding: 20px; }
        h1, h2, h3 { text-align: center; color: #ffcc00; margin-bottom: 15px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .panel { background: #333; padding: 15px; border-radius: 8px; border: 1px solid #555; }
        .form-group { margin-bottom: 12px; padding: 10px; background: #3d3d3d; border-radius: 6px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #ffcc00;}
        input, select, textarea { width: 100%; padding: 8px; background: #222; border: 1px solid #666; color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        button:hover { background: #2ecc71; }
        .btn-orange { background: #e67e22; }
        .btn-orange:hover { background: #f39c12; }
        .btn-red { background: #c0392b; }
        .btn-red:hover { background: #e74c3c; }
        .btn-blue { background: #2980b9; }
        .btn-blue:hover { background: #3498db; }
        .inline-group { display: flex; gap: 10px; margin-top: 5px; }
        .inline-group button { margin-top: 0; }
        .bet-display { font-size: 20px; font-weight: bold; text-align: center; color: #00e676; margin: 10px 0; background: #000; padding: 10px; border-radius: 4px; border: 1px dashed #555; }
    </style>
</head>
<body>

    <h1>HỆ THỐNG ĐIỀU KHIỂN TRÒ CHƠI</h1>
    
    <div class="grid-container">
        <div class="panel">
            <h2>NẠP DỮ LIỆU & NỘI DUNG</h2>
            
            <div class="form-group">
                <label>1. Tải Câu Hỏi Từ Excel</label>
                <input type="file" id="excel-file" accept=".xlsx, .xls" onchange="importExcel(this)">
            </div>

            <div class="form-group">
                <label>2. Chọn Vòng Chơi (Luật ẩn cửa tự động)</label>
                <select id="select-round" onchange="handleRoundChange()">
                    <option value="1">Vòng 1 (Hiển thị tất cả 4 cửa)</option>
                    <option value="5">Vòng 5 (Ẩn cửa số 4 - Còn 3 cửa)</option>
                    <option value="8">Vòng 8 (Ẩn cửa 1 và 4 - Còn 2 cửa)</option>
                </select>
            </div>

            <div class="form-group">
                <label>2b. Chọn Câu Hỏi Cụ Thể Trong Vòng</label>
                <select id="select-question-index" onchange="loadSelectedQuestion()">
                    <option value="">-- Chưa có câu hỏi --</option>
                </select>
            </div>

            <div class="form-group">
                <label>3. Chủ Đề Để Lựa Chọn</label>
                <input type="text" id="topic-a" placeholder="Tên chủ đề A" style="margin-bottom: 5px;">
                <input type="text" id="topic-b" placeholder="Tên chủ đề B">
                <div class="inline-group">
                    <button class="btn-blue" onclick="sendTopics()">Hiện 2 Chủ Đề</button>
                    <button class="btn-orange" onclick="lockTopic('A')">Chốt Chủ Đề A</button>
                    <button class="btn-orange" onclick="lockTopic('B')">Chốt Chủ Đề B</button>
                </div>
            </div>

            <div class="form-group">
                <label>4. Câu Hỏi & Đáp Án</label>
                <textarea id="question-input" rows="2" placeholder="Nội dung câu hỏi chữ lớn..." style="margin-bottom: 5px;"></textarea>
                <button class="btn-blue" onclick="sendQuestion()">Hiện Câu Hỏi Lên Màn Hình</button>
                
                <div style="margin-top: 10px; border-top: 1px solid #555; padding-top: 10px;">
                    <input type="text" id="ans-1" placeholder="Đáp án cửa 1" style="margin-bottom: 3px;">
                    <button onclick="sendSingleAnswer(1)">Hiện Đáp Án 1</button>
                    
                    <input type="text" id="ans-2" placeholder="Đáp án cửa 2" style="margin-top: 5px; margin-bottom: 3px;">
                    <button onclick="sendSingleAnswer(2)">Hiện Đáp Án 2</button>
                    
                    <input type="text" id="ans-3" placeholder="Đáp án cửa 3" style="margin-top: 5px; margin-bottom: 3px;">
                    <button onclick="sendSingleAnswer(3)">Hiện Đáp Án 3</button>
                    
                    <input type="text" id="ans-4" placeholder="Đáp án cửa 4" style="margin-top: 5px; margin-bottom: 3px;">
                    <button onclick="sendSingleAnswer(4)">Hiện Đáp Án 4</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>HỆ THỐNG THỜI GIAN & HỐ SẬP</h2>
            
            <div class="form-group">
                <label id="time-display">THỜI GIAN ĐẶT CƯỢC: --:--</label>
                <div class="inline-group">
                    <button onclick="startTimer()">Bắt Đầu Đếm (60s)</button>
                    <button class="btn-orange" onclick="add30Seconds()">+30 Giây</button>
                    <button class="btn-red" onclick="stopTimer()">Dừng Thời Gian</button>
                </div>
            </div>

            <div class="form-group">
                <label>Theo Dõi Tiền Đặt Cược Trực Tuyến</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>Cửa 1: <div class="bet-display" id="mc-bet-1">0 $A</div></div>
                    <div>Cửa 2: <div class="bet-display" id="mc-bet-2">0 $A</div></div>
                    <div>Cửa 3: <div class="bet-display" id="mc-bet-3">0 $A</div></div>
                    <div>Cửa 4: <div class="bet-display" id="mc-bet-4">0 $A</div></div>
                </div>
            </div>

            <div class="form-group">
                <label>Kích Hoạt Sập Hố Vật Lý</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-red" onclick="openDoor(1)">SẬP HỐ LỖI 1</button>
                    <button class="btn-red" onclick="openDoor(2)">SẬP HỐ LỖI 2</button>
                    <button class="btn-red" onclick="openDoor(3)">SẬP HỐ LỖI 3</button>
                    <button class="btn-red" onclick="openDoor(4)">SẬP HỐ LỖI 4</button>
                </div>
            </div>

            <div class="form-group" style="background: #2c3e50;">
                <label style="color: #fff;">Quản Lý Vòng Đấu</label>
                <button onclick="collectWinningMoney()">THU TIỀN THẮNG VỀ BÀN</button>
                <button class="btn-orange" onclick="penaltyFine()">PHẠT GIẢM 1 CỌC TIỀN</button>
                <button class="btn-red" onclick="resetRound()" style="margin-top: 10px;">RESET TOÀN BỘ VÒNG CHƠI mới</button>
            </div>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('gameshow_money_drop');
        let excelDataStore = [];
        let timeLeft = 60;
        let timerInterval = null;

        function sendCommand(action, data = {}) {
            channel.postMessage({ action, data });
        }

        function importExcel(element) {
            const file = element.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                parseExcelQuestions(json);
            };
            reader.readAsArrayBuffer(file);
        }

        function parseExcelQuestions(rows) {
            excelDataStore = [];
            let currentRoundId = null;
            
            // Đọc cấu trúc hàng dọc theo file của bạn
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                if (row[0] !== undefined && row[0] !== "") currentRoundId = parseInt(row[0]);
                if (!currentRoundId || isNaN(currentRoundId)) continue;

                excelDataStore.push({
                    round: currentRoundId,
                    topicA: row[1] ? row[1].toString().trim() : "",
                    topicB: row[2] ? row[2].toString().trim() : "", 
                    questionText: row[3] ? row[3].toString().trim() : "",
                    answers: [
                        row[4] ? row[4].toString().trim() : "",
                        row[5] ? row[5].toString().trim() : "",
                        row[6] ? row[6].toString().trim() : "",
                        row[7] ? row[7].toString().trim() : ""
                    ]
                });
            }
            alert("Tải câu hỏi từ tệp Excel thành công!");
            handleRoundChange();
        }

        function handleRoundChange() {
            const round = parseInt(document.getElementById('select-round').value);
            sendCommand('change_round', { round: round });

            // Lọc ra các câu hỏi thuộc Vòng này và đẩy vào ô Chọn Câu Hỏi
            const qSelect = document.getElementById('select-question-index');
            qSelect.innerHTML = "";
            
            const filteredQuestions = excelDataStore.filter(item => item.round === round);
            if(filteredQuestions.length === 0) {
                qSelect.innerHTML = '<option value="">-- Không có câu hỏi nào thuộc vòng này --</option>';
                return;
            }

            filteredQuestions.forEach((q, idx) => {
                const opt = document.createElement('option');
                opt.value = excelDataStore.indexOf(q); // Lấy vị trí gốc trong mảng
                opt.innerText = `Câu ${idx + 1}: ${q.questionText.substring(0, 30)}...`;
                qSelect.appendChild(opt);
            });

            loadSelectedQuestion();
        }

        function loadSelectedQuestion() {
            const qIdx = document.getElementById('select-question-index').value;
            if(qIdx === "") return;
            
            const currentData = excelDataStore[qIdx];
            if (currentData) {
                document.getElementById('topic-a').value = currentData.topicA;
                document.getElementById('topic-b').value = currentData.topicB;
                document.getElementById('question-input').value = currentData.questionText || "";
                for (let i = 1; i <= 4; i++) {
                    document.getElementById(`ans-${i}`).value = currentData.answers[i-1] || "";
                }
            }
        }

        function sendTopics() {
            const ta = document.getElementById('topic-a').value;
            const tb = document.getElementById('topic-b').value;
            sendCommand('show_topics', { ta, tb });
        }

        function lockTopic(type) {
            const topicName = type === 'A' ? document.getElementById('topic-a').value : document.getElementById('topic-b').value;
            sendCommand('lock_topic', { type, topicName });
        }

        function sendQuestion() {
            const qText = document.getElementById('question-input').value;
            sendCommand('update_content', { type: 'question', data: { question: qText } });
        }

        function sendSingleAnswer(id) {
            const text = document.getElementById(`ans-${id}`).value;
            // Sửa logic bắn tín hiệu: Đảm bảo cả Player và Host nhận dạng đồng nhất
            sendCommand('update_single_answer', { id, text });
        }

        channel.onmessage = function(event) {
            if (event.data.action === 'sync_bets_to_mc') {
                const data = event.data.data;
                for (let i = 1; i <= 4; i++) {
                    if (document.getElementById(`mc-bet-${i}`)) {
                        document.getElementById(`mc-bet-${i}`).innerText = (data[`b${i}`] || 0).toLocaleString('vi-VN') + " $A";
                    }
                }
            }
        };

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            updateTimerDisplay();
            sendCommand('timer_control', { status: 'start', time: timeLeft });
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                sendCommand('timer_tick', { time: timeLeft });
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    sendCommand('timer_control', { status: 'timeout' });
                }
            }, 1000);
        }

        function add30Seconds() {
            clearInterval(timerInterval);
            timeLeft += 30;
            updateTimerDisplay();
            sendCommand('timer_control', { status: 'add30', time: timeLeft });
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                sendCommand('timer_tick', { time: timeLeft });
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    sendCommand('timer_control', { status: 'timeout' });
                }
            }, 1000);
        }

        function stopTimer() { 
            clearInterval(timerInterval); 
            sendCommand('timer_control', { status: 'stop' }); 
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
            document.getElementById('time-display').innerText = `THỜI GIAN ĐẶT CƯỢC: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function openDoor(doorId) { sendCommand('open_door', { doorId }); }
        function collectWinningMoney() { sendCommand('collect_winning'); }
        function penaltyFine() { sendCommand('penalty_fine'); }

        function resetRound() {
            stopTimer();
            document.getElementById('time-display').innerText = `THỜI GIAN ĐẶT CƯỢC: --:--`;
            for (let i = 1; i <= 4; i++) {
                if(document.getElementById(`mc-bet-${i}`)) document.getElementById(`mc-bet-${i}`).innerText = "0 $A";
            }
            sendCommand('reset_round');
        }
    </script>
</body>
</html>
